<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- OG card generator. Render at 1200x630 and screenshot to assets/og/<slug>.png
       Usage: /tools/og-card.html?title=...&tag=...  (see README → Per-post OG images) -->
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    :root { --bg:#0A0910; --purple:#6700E5; --purple-text:#B794FF; --fg:#F4F2F8; --faint:#6E6A7E; --line:rgba(255,255,255,0.10); }
    * { margin:0; box-sizing:border-box; }
    html,body { width:1200px; height:630px; overflow:hidden; }
    .card { position:relative; width:1200px; height:630px; background:var(--bg); color:var(--fg);
      padding:74px 76px; display:flex; flex-direction:column; justify-content:space-between;
      font-family:"PolySans", system-ui, sans-serif; overflow:hidden; }
    .card::before { content:""; position:absolute; inset:0; background:
      radial-gradient(120% 90% at 92% 6%, rgba(103,0,229,0.30), rgba(103,0,229,0) 55%); }
    .card::after { content:""; position:absolute; inset:0; opacity:0.5;
      background-image:radial-gradient(rgba(255,255,255,0.05) 1.4px, transparent 1.4px);
      background-size:26px 26px; -webkit-mask-image:linear-gradient(180deg, transparent 35%, #000); }
    .bar { position:absolute; top:0; left:0; height:6px; width:100%; background:linear-gradient(90deg, var(--purple), var(--purple-text)); }
    .row { position:relative; display:flex; align-items:center; justify-content:space-between; }
    .brand { display:flex; align-items:center; gap:18px; }
    .mark { width:54px; height:54px; border-radius:12px; background:var(--purple); display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:24px; letter-spacing:0.02em; color:#fff; }
    .who { font-family:"PolySans Mono", ui-monospace, monospace; font-size:21px; letter-spacing:0.06em; }
    .kicker { font-family:"PolySans Mono", ui-monospace, monospace; font-size:16px; letter-spacing:0.18em; text-transform:uppercase; color:var(--faint); }
    .main { position:relative; }
    .tag { font-family:"PolySans Mono", ui-monospace, monospace; font-size:18px; letter-spacing:0.14em; text-transform:uppercase; color:var(--purple-text); margin-bottom:22px; }
    .title { font-family:"PolySans Wide", "PolySans", sans-serif; font-weight:500; font-size:84px; line-height:0.98; letter-spacing:-0.02em; max-width:15ch; }
    .foot { position:relative; display:flex; align-items:center; justify-content:space-between;
      font-family:"PolySans Mono", ui-monospace, monospace; font-size:18px; letter-spacing:0.04em; color:var(--faint); }
    .foot .site { color:var(--purple-text); }
  </style>
</head>
<body>
  <div class="card">
    <span class="bar"></span>
    <div class="row">
      <div class="brand"><span class="mark">AG</span><span class="who">Akshat Gada</span></div>
      <span class="kicker">Writing</span>
    </div>
    <div class="main">
      <div class="tag" id="tag">Essay</div>
      <h1 class="title" id="title">Untitled</h1>
    </div>
    <div class="foot"><span class="site">akshatgada.com</span><span>Agentic payments · Polygon</span></div>
  </div>
  <script>
    var p = new URLSearchParams(location.search);
    if (p.get('title')) document.getElementById('title').textContent = p.get('title');
    if (p.get('tag')) document.getElementById('tag').textContent = p.get('tag');
  </script>
</body>
</html>
